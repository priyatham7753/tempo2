name: Product Service CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/product-service

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: product-service/package-lock.json
      - run: npm ci
        working-directory: product-service
      - run: npm run lint --if-present
        working-directory: product-service
      - run: npm test -- --coverage --passWithNoTests
        working-directory: product-service

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=product-service
            -Dsonar.sources=product-service/src
            -Dsonar.javascript.lcov.reportPaths=product-service/coverage/lcov.info

  snyk:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=product-service/package.json

  build-push:
    name: Build, Trivy Scan & Push
    runs-on: ubuntu-latest
    needs: [sonar, snyk]
    permissions:
      contents: write
      packages: write
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image (local)
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          load: true

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  update-helm:
    name: Update Helm Chart Image Tag
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HELM_CHARTS_TOKEN }}
      - name: Update image tag
        run: |
          SHA="${{ needs.build-push.outputs.sha_short }}"
          sed -i "s|^  tag:.*|  tag: \"${SHA}\"|" helm-charts/product-chart/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm-charts/product-chart/values.yaml
          git commit -m "ci: update product-service image tag to ${SHA} [skip ci]"
          git push

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [build-push, update-helm]
    if: always()
    steps:
      - uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "*Product Service CI* — ${{ needs.build-push.result == 'success' && '✅ Succeeded' || '❌ Failed' }}\nBranch: `${{ github.ref_name }}`\nCommit: `${{ needs.build-push.outputs.sha_short }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
