# ── ArgoCD AppProject ─────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopmesh
  namespace: argocd
spec:
  description: ShopMesh E-Commerce Microservices Platform
  sourceRepos:
    - "https://github.com/priyatham7753/tempo2"
  destinations:
    - namespace: frontend
      server: https://kubernetes.default.svc
    - namespace: backend
      server: https://kubernetes.default.svc
    - namespace: database
      server: https://kubernetes.default.svc
    - namespace: gateway
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: storage.k8s.io
      kind: StorageClass
    - group: gateway.networking.k8s.io
      kind: GatewayClass
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
# ── Frontend Application ──────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopmesh-frontend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: shopmesh
  source:
    repoURL: https://github.com/priyatham7753/tempo2
    targetRevision: main
    path: helm-charts/frontend-chart
    helm:
      valueFiles:
        - values.yaml
        - ../../gitops/environments/prod/frontend-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: frontend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
