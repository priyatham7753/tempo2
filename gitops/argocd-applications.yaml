# ── Auth MongoDB Application ──────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopmesh-auth-mongodb
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: shopmesh
  source:
    repoURL: https://github.com/priyatham7753/tempo2
    targetRevision: main
    path: helm-charts/mongodb
    helm:
      parameters:
        - name: fullname
          value: auth-mongodb
        - name: auth.user
          value: authuser
        - name: auth.database
          value: authdb
        - name: ownerService
          value: auth-service
      valueFiles:
        - ../../gitops/environments/prod/auth-mongodb-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: database
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
