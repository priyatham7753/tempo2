apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-netpol
  namespace: {{ .Values.namespace | default "backend" }}
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from gateway namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway
      ports:
        - port: {{ .Values.port }}
    # Allow from frontend namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: frontend
      ports:
        - port: {{ .Values.port }}
    # Allow from order-service in same namespace
    - from:
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - port: {{ .Values.port }}
    # Allow from product-service in same namespace
    - from:
        - podSelector:
            matchLabels:
              app: product-service
      ports:
        - port: {{ .Values.port }}
  egress:
    # Allow to auth-mongodb only
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
          podSelector:
            matchLabels:
              app: auth-mongodb
      ports:
        - port: 27017
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
