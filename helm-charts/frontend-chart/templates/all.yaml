apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.namespace | default "frontend" }}
  labels:
    app: frontend
    version: {{ .Values.image.tag | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: REACT_APP_AUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: REACT_APP_AUTH_URL
            - name: REACT_APP_PRODUCT_URL
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: REACT_APP_PRODUCT_URL
            - name: REACT_APP_ORDER_URL
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: REACT_APP_ORDER_URL
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.namespace | default "frontend" }}
  labels:
    app: frontend
spec:
  type: {{ .Values.service.type }}
  selector:
    app: frontend
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: {{ .Values.namespace | default "frontend" }}
  labels:
    app: frontend
data:
  REACT_APP_AUTH_URL: {{ .Values.env.REACT_APP_AUTH_URL | quote }}
  REACT_APP_PRODUCT_URL: {{ .Values.env.REACT_APP_PRODUCT_URL | quote }}
  REACT_APP_ORDER_URL: {{ .Values.env.REACT_APP_ORDER_URL | quote }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-netpol
  namespace: {{ .Values.namespace | default "frontend" }}
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway
      ports:
        - port: {{ .Values.port }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: backend
      ports:
        - port: 3001
        - port: 3002
        - port: 8000
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
