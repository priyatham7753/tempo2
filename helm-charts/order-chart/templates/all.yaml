apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: {{ .Values.namespace | default "backend" }}
  labels:
    app: order-service
    version: {{ .Values.image.tag | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        version: {{ .Values.image.tag | quote }}
    spec:
      containers:
        - name: order-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: MONGO_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: order-config
                  key: MONGO_DB_NAME
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: order-config
                  key: AUTH_SERVICE_URL
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: order-config
                  key: PRODUCT_SERVICE_URL
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: order-secret
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: order-secret
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: {{ .Values.namespace | default "backend" }}
  labels:
    app: order-service
spec:
  type: {{ .Values.service.type }}
  selector:
    app: order-service
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-config
  namespace: {{ .Values.namespace | default "backend" }}
  labels:
    app: order-service
data:
  MONGO_DB_NAME: {{ .Values.env.MONGO_DB_NAME | quote }}
  AUTH_SERVICE_URL: {{ .Values.env.AUTH_SERVICE_URL | quote }}
  PRODUCT_SERVICE_URL: {{ .Values.env.PRODUCT_SERVICE_URL | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: order-secret
  namespace: {{ .Values.namespace | default "backend" }}
  labels:
    app: order-service
type: Opaque
data:
  MONGO_URI: {{ .Values.secrets.mongoUri | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: order-service-netpol
  namespace: {{ .Values.namespace | default "backend" }}
spec:
  podSelector:
    matchLabels:
      app: order-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway
      ports:
        - port: {{ .Values.port }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: frontend
      ports:
        - port: {{ .Values.port }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
          podSelector:
            matchLabels:
              app: order-mongodb
      ports:
        - port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - port: 3001
    - to:
        - podSelector:
            matchLabels:
              app: product-service
      ports:
        - port: 3002
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
