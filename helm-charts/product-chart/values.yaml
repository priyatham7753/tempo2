namespace: backend
replicaCount: 2

image:
  repository: ghcr.io/YOUR_GITHUB_ORG/product-service
  tag: "latest"
  pullPolicy: IfNotPresent

port: 3002

service:
  type: ClusterIP
  port: 3002

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "400m"
    memory: "384Mi"

env:
  PORT: "3002"
  NODE_ENV: "production"
  MONGO_DB_NAME: "productdb"
  AUTH_SERVICE_URL: "http://auth-service.backend.svc.cluster.local:3001"

secrets:
  mongoUri: "mongodb://productuser:productpass@product-mongodb-0.product-mongodb-headless.database.svc.cluster.local:27017/productdb"
  jwtSecret: "CHANGE_ME_JWT_SECRET_MIN_32_CHARS_LONG"
