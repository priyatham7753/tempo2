# ── GatewayClass ──────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: kgateway
spec:
  controllerName: gateway.kgateway.dev/kgateway
---
# ── Gateway ───────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shopmesh-gateway
  namespace: gateway
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
---
# ── HTTPRoute: Frontend (/) ────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: frontend
spec:
  parentRefs:
    - name: shopmesh-gateway
      namespace: gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          namespace: frontend
          port: 80
---
# ── HTTPRoute: Auth (/api/auth) ────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: backend
spec:
  parentRefs:
    - name: shopmesh-gateway
      namespace: gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          namespace: backend
          port: 3001
---
# ── HTTPRoute: Product (/api/products) ────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: product-route
  namespace: backend
spec:
  parentRefs:
    - name: shopmesh-gateway
      namespace: gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/products
      backendRefs:
        - name: product-service
          namespace: backend
          port: 3002
---
# ── HTTPRoute: Order (/api/orders) ────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: order-route
  namespace: backend
spec:
  parentRefs:
    - name: shopmesh-gateway
      namespace: gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/orders
      backendRefs:
        - name: order-service
          namespace: backend
          port: 8000
