# ── StorageClass (NFS — manual provisioner) ────────────────────────────────────
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
# ── auth-mongodb PV ───────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: auth-mongodb-pv
  labels:
    pv-name: auth-mongodb-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-storage
  nfs:
    server: 10.0.0.10        # ← Replace with your NFS server IP
    path: /exports/auth-mongodb
  mountOptions:
    - hard
    - nfsvers=4.1
---
